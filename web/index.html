<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS / Safari meta tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Beauty">

    <!-- Apple touch icon (Safari bookmarks & iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

    <!-- Favicon for all browsers -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">

    <!-- Firefox (SVG — scales perfectly at any size) -->
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">

    <!-- Android Chrome / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/web-app-manifest-512x512.png">

    <title>Beauty</title>
    <link rel="manifest" href="manifest.json">
</head>
